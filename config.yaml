# HL Reaper — Phase 1 configuration
network: testnet            # testnet | mainnet

# Main account address (the wallet that holds funds — PUBLIC address only).
# The bot signs with the API wallet secret (HL_REAPER_SECRET env var) but
# acts on behalf of this account.
account_address: "0xBC6F4A41272a2E55B488380498E1e3aE569B08b0"

coins: ["BTC", "ETH", "SOL", "ARB", "AVAX", "DOGE", "WIF"]
candle_intervals: ["1m", "5m", "1h"]
candle_buffer_size: 500     # candles kept per coin/interval

pollers:
  asset_ctx_seconds: 60     # funding / OI / mark px poll
  funding_history_minutes: 30
  funding_lookback_hours: 24

heartbeat:
  # changed from /tmp/hl_reaper_heartbeat at Phase 6 start: the old Phase 1
  # data service writes that path too, which would blind the watchdog to a
  # dead trading loop. The trading loop owns this file exclusively.
  path: "/tmp/hl_reaper_bot_heartbeat"
  interval_seconds: 30

stale_feed_seconds: 30      # WS considered stale after this

db_path: "data/hl_reaper.db"
log_level: "INFO"

# Phase 1 test-order settings (used only by scripts/test_order.py)
test_order:
  coin: "BTC"
  usd_size: 12              # ~minimum order value is $10
  limit_offset_pct: 20      # rest a limit bid 20% below mid (never fills)

# ---- Phase 2: risk engine ----
risk:
  daily_drawdown_limit: 0.05
  severe_drawdown_limit: 0.10
  max_concurrent_positions: 3
  max_per_symbol: 1
  max_leverage: 5.0
  min_confidence: 0.62
  # quorum is counted over the 5 active DIRECTIONAL voters (TA, MeanRev,
  # Funding, OB, VWAP). ML + LiqHeatmap are permanently FLAT and RegimeDetector
  # is a non-voting meta-router, so they never count. Was 5 (= unanimity of the
  # 5 since the model deaths — effectively un-fireable); 4 of 5 = 80%, still
  # strict and mainnet-cautious.
  min_model_agreement: 4
  max_spread_pct: 0.0015
  atr_sl_multiplier: 1.5
  atr_trail_multiplier: 1.0
  trail_activation_r: 1.5
  take_profit_r: 2.0           # TP at this multiple of the initial risk (R)
  # breakeven profit lock (2026-06-20): once a position reaches breakeven_lock_r
  # of unrealized profit, snap the SL to entry + a small fee-covering buffer so a
  # winning trade can never give back into a loss. Earlier + tighter than the
  # trailing stop (which only activates at trail_activation_r). Fires once.
  breakeven_lock_enabled: true
  breakeven_lock_r: 0.5        # move SL to breakeven once position reaches this R
  breakeven_lock_buffer_pct: 0.05  # lock this % above entry (LONG) / below (SHORT)
  max_loss_per_trade_pct: 0.02
  emergency_loss_pct: 0.03
  max_hold_hours_scalp: 4
  max_hold_hours_swing: 48
  cascade_oi_drop_pct: 0.15
  cascade_price_move_pct: 0.03
  cascade_window_minutes: 5
  cascade_halt_hours: 2
  extreme_funding_long_halt: 0.001
  extreme_funding_short_halt: -0.001
  # funding HARD-block (2026-06-16): when FundingRateModel votes SHORT at >= this
  # confidence (crowded-long extreme), LONG entries are blocked outright. Extends
  # the existing 0.6x funding veto, which only dampens. SHORTs untouched.
  funding_hard_block_enabled: true
  funding_hard_block_conf: 0.75
  # SHORT mirror of the funding hard-block — OFF by default (working side).
  # When on, FundingRate LONG conf >= conf blocks SHORT entries.
  funding_hard_block_short_enabled: false
  funding_hard_block_short_conf: 0.75
  # FundingRateModel direction mapping (2026-06-20). false = original binary
  # zone rule (mild-positive funding -> LONG, SHORT only past the 0.001 extreme).
  # true = smoothed continuous mapping (positive -> SHORT lean, negative -> LONG
  # lean, conf ramps with magnitude) — widens funding's SHORT contribution. Hot-
  # reloadable A/B switch; default false so the old mapping stays the fallback.
  # The active mapping is stamped on each OPEN trade note (fmap=binary|smooth).
  funding_smooth_mapping_enabled: false
  # master switch for the Layer-3 liquidation-cascade kill switch
  cascade_detection_enabled: true
  flash_crash_candle_pct: 0.05
  weekly_drawdown_limit: 0.10
  cooldown_hours: 48

  # ---- Dual-band geometry (2026-06-20) -------------------------------------
  # Two independent bands trade simultaneously: SCALP (5m, tight/fast/frequent)
  # and TREND (1h, wide/patient/rare). One-way exchange nets per coin, so a coin
  # is owned by at most ONE band at a time (the other is blocked on that coin);
  # dual-band still runs portfolio-wide. The scalar risk values above remain the
  # legacy fallback for any band param left unset. SL/TP/trail/hold/breakeven and
  # the entry gate (confidence/agreement) are per band; cascade detection,
  # drawdown circuit breakers and max_leverage stay GLOBAL across both bands.
  # SCALP band — tight & fast
  scalp_min_confidence: 0.40
  scalp_min_model_agreement: 2       # lower bar — frequent small trades
  scalp_atr_sl_multiplier: 1.0
  scalp_take_profit_r: 1.5
  scalp_trail_activation_r: 1.0
  scalp_max_hold_hours: 0.5
  scalp_breakeven_lock_r: 0.4
  scalp_max_concurrent_positions: 3
  scalp_position_size_usd: 30
  scalp_structural_gates_enabled: true   # LONG/SHORT structural gates apply here only
  # TREND band — wide & patient (no structural gates: its own 1h signal IS the gate)
  trend_min_confidence: 0.55
  trend_min_model_agreement: 3       # higher bar — fewer, higher-conviction trades
  trend_atr_sl_multiplier: 2.5
  trend_take_profit_r: 4.0
  trend_trail_activation_r: 2.0
  trend_max_hold_hours: 48.0
  trend_breakeven_lock_r: 0.8
  trend_max_concurrent_positions: 2
  trend_position_size_usd: 75
  # regime bias: 1h regime dampens (never blocks) counter-trend scalp confidence
  regime_counter_trend_penalty: 0.7  # 0.3x–1.0x; lower = harder to fade the trend

# ---- Phase 8.6: cascade bounce (event-driven track, separate from ensemble)
cascade_bounce:
  enabled: false
  allocation_pct: 0.12          # max bounce position = 12% of equity
  max_hold_minutes: 20          # hard time exit (enforced by RiskManager)
  maker_timeout_seconds: 5      # maker-then-taker: short post-only attempt...
  taker_fallback: true          # ...then take the market (speed beats fees here)
  min_cascade_move_pct: 0.015   # 1.5% move in window = cascade candidate
  cascade_window_minutes: 5
  min_volume_mult: 3.0          # window volume vs 1h baseline
  stabilization_bars: 2         # 1m bars without a new extreme -> enter
  cascade_stale_minutes: 15     # still falling after this -> abandon episode
  retrigger_cooldown_minutes: 30
  profit_target_pct: 0.010      # fast exit: +1.0% TP
  stop_pct: 0.0075              # -0.75% SL (beyond the extreme = thesis dead)

# ---- Phase 3: model settings ----
models:
  ml_model_dir: "models/"
  ml_min_confidence: 0.55
  ob_top_levels: 10
  ob_min_imbalance: 0.30
  # TAModel regime-aware RSI thresholds (2026-06-24). In a clear trend the
  # blend's mean-reversion components cancel its trend components and TA abstains
  # (FLAT) right when the regime is TRENDING — starving the aggregator of voters.
  # In TRENDING_UP/DOWN, TA switches to these relaxed RSI thresholds so it agrees
  # with the trend at MODERATE RSI and only fades at a true extreme. RANGING /
  # HIGH_VOL keep the original blend (ranging.* below is accepted for
  # completeness but the RANGING path is deliberately unchanged). Hot-reloadable
  # via live_config (keys models.ta.trending.*), re-read by run_bot each loop.
  ta:
    ranging:
      rsi_short: 68            # (reference only — RANGING uses the original blend)
      rsi_long: 32
    trending:
      rsi_short: 48            # downtrend: SHORT (trend-aligned) once RSI >= this
      rsi_long: 38             # downtrend: LONG only at this extreme oversold
      rsi_neutral_low: 48      # confidence anchor: firing edge -> conf ~0.40
      rsi_neutral_high: 55     # +0.20 conf per (high-low) of extra RSI travel
  # MomentumModel (2026-06-24): price-velocity / trend-following voter. Reads the
  # weighted rate-of-change of close over 3/6/12 candles and votes WITH a fast
  # move (SHORT on a hard drop, LONG on a hard pump). Added after a -4.86% BTC
  # drop during which the ensemble called LONG the whole way down. Hot-reloadable
  # via live_config (keys models.momentum.*), re-read by run_bot each loop.
  momentum:
    enabled: true
    short_threshold: -0.003    # -0.3% weighted composite move triggers SHORT
    long_threshold: 0.003      # +0.3% weighted composite move triggers LONG
    full_conf_move: 0.010      # 1.0% composite = full confidence (0.95 ceiling)
    min_candles: 15            # minimum candles required to vote (else FLAT)
    ranging_weight_damp: 0.70  # 70% of full weight in a RANGING regime (noisier)

# ---- aggregator: regime-aware weight dampening ----
aggregator:
  # FundingRateModel fades the crowd — great in RANGING/HIGH_VOL squeezes, but a
  # systematic drag in a sustained 1h trend (it votes counter-trend for hours).
  # When FUNDING votes against the confirmed 1h trend (LONG in TRENDING_DOWN /
  # SHORT in TRENDING_UP) its aggregator WEIGHT is multiplied by this factor.
  # 0.0 = ignore funding entirely when counter-trend, 1.0 = no dampening.
  funding_counter_trend_damp: 0.40

# ---- Phase 4/5: trading loop ----
trading:
  # The legacy paper_aggressive/conservative "mode" toggle is gone. The risk
  # section above is the mainnet-safe FLOOR (conf 0.62 / quorum 4-of-5 / 3
  # positions); every gate is now an individual live_config override set from
  # the Controls page (takes effect next loop, no restart). Clearing all
  # overrides restores this floor.
  loop_interval_seconds: 10
  default_usd_size: 50
  default_leverage: 3.0
  # direction master switches — one-click live toggles from the Controls page
  # (hot-reload, no restart). 2026-06-17: the LONG side has no structural edge
  # (214 trades, 37% win, net -$6.14) while SHORT carries the account (+$21.33),
  # so LONGs can be switched off entirely until a real LONG edge is found.
  # The dashboard refuses to disable BOTH (that would halt all new entries).
  longs_enabled: true
  shorts_enabled: true
  # ---- Dual-band master switches (2026-06-20) ------------------------------
  # Each band can be turned off independently from the Controls page (hot-
  # reload). At least one must stay enabled — disabling both halts all new
  # entries (use pause for that). The candle resolution each band aggregates on.
  scalp_band_enabled: true
  trend_band_enabled: true
  scalp_interval: "5m"
  trend_interval: "1h"
  # Per-band direction toggles. Effective direction = global (longs/shorts_enabled)
  # AND the band flag — so a band can run LONG-only while the other runs both.
  scalp_longs_enabled: true
  scalp_shorts_enabled: true
  trend_longs_enabled: true
  trend_shorts_enabled: true
  coins_active: ["BTC", "ETH", "SOL", "ARB", "AVAX", "DOGE", "WIF"]
  entry_style: "maker"        # maker = post-only limit, skip if unfilled; taker = market
  entry_timeout_seconds: 30
  # intelligent taker fallback: on a maker-timeout STREAK (sharp directional
  # move outrunning the limit), re-validate the live signal + move and convert
  # to a taker market order instead of missing the trade. Maker stays the
  # default; this only fires after repeated timeouts, never on the first.
  maker_timeout_fallback_enabled: true    # master switch; false = old behavior
  maker_timeout_fallback_n: 3             # consecutive maker timeouts before check
  maker_timeout_fallback_window_s: 180    # window to count the streak within
  maker_timeout_exhaustion_atr_mult: 1.5  # price already moved this*ATR our way = skip
  # armed-signal TTL (2026-06-22): a signal "arms" when it first clears every
  # entry gate (can_open) on a coin+band. The maker may then keep retrying
  # across cycles while it sits unfilled. These ceilings bound how long an
  # armed setup may keep retrying before it is dropped as stale — beyond the
  # TTL the original votes/conf no longer reflect current microstructure, so
  # the entry is abandoned (logged [ARMED_TTL]) rather than filled into a
  # changed market. Scalp is short-lived; trend tolerates more lag.
  scalp_armed_ttl_seconds: 75
  trend_armed_ttl_seconds: 75
  # LONG structural gate (2026-06-17): supersedes the old OB/VWAP confirmation
  # (Change B). A LONG must clear ALL THREE structural signals — spot LEADING
  # perp (real demand, not leverage), OI RISING (fresh longs entering), and the
  # book BID-HEAVY (live buy pressure). Targets the LONG bleed (210 trades, 37%
  # win, gross -$0.01). Any signal that can't be computed FAILS (block the LONG).
  # SHORTs are never gated — the working side stays untouched.
  long_structural_gate_enabled: true
  long_spot_lead_threshold: 0.0002   # min spot return to count as leading (0.02%)
  long_oi_rise_threshold: 0.001      # min OI increase to count as rising (0.1%)
  long_ob_bid_threshold: 0.20        # min top-of-book bid imbalance (60/40)
  long_spot_lookback_minutes: 5      # how far back to compare spot vs perp
  long_oi_lookback_minutes: 5        # how far back to compare OI
  # LONG momentum cooldown (2026-06-18, anti-pump-top): 4th structural signal.
  # Even with spot/OI/book all green, entering right after a sharp upward move
  # catches the top — losing LONGs have a 4.6m MEDIAN hold (stopped on the
  # retrace). Block new LONGs when price ran up past any threshold recently and
  # let the consolidation happen first. The symmetric SHORT dump-cooldown is
  # deliberately NOT added (SHORT side works: 57% win, +$21.46). Tunable live.
  long_pump_cooldown_enabled: true
  long_pump_threshold_1: 0.005       # block if price up >0.5% in last 5m
  long_pump_threshold_2: 0.008       # block if price up >0.8% in last 10m
  long_pump_threshold_3: 0.012       # block if price up >1.2% in last 15m
  # Legacy Change B OB/VWAP confirmation — superseded by the structural gate
  # above, kept OFF so it doesn't double-filter. Still read by the dashboard.
  long_confirmation_enabled: false
  long_confirmation_models: ["OrderbookImbalanceModel", "VWAPModel"]
  long_confirmation_min: 1
  # SHORT mirror of the microstructure confirmation gate — OFF by default
  # (legacy; superseded by the SHORT structural gate below). Still read by the
  # dashboard / regression suite.
  short_confirmation_enabled: false
  short_confirmation_models: ["OrderbookImbalanceModel", "VWAPModel"]
  short_confirmation_min: 1
  # SHORT structural gate (2026-06-19): mirror of the LONG gate for the SHORT
  # side. Targets the SHORT drought (33 SHORTs on 6/17 -> 0 on 6/19) caused by
  # the regime detector lagging into TRENDING_UP while real structure was DOWN.
  # A SHORT must clear ALL FOUR signals — spot LAGGING perp (real selling, not a
  # leverage bounce), OI RISING with FALLING price (fresh shorts entering), book
  # ASK-HEAVY (live sell pressure), and the dump cooldown (no recent sharp drop,
  # anti-dump-bottom). Any of signals 1-3 that can't be computed FAILS (block).
  # ⚠ TESTNET: OI barely moves (0.01-0.04%/5m); set short_oi_rise_threshold=0.0
  #   via live_config for testnet and CLEAR IT BEFORE MAINNET.
  short_structural_gate_enabled: true
  short_spot_lag_threshold: 0.0002    # min spot drop to count as lagging (0.02%)
  short_oi_rise_threshold: 0.001      # min OI increase to count as rising (0.1%)
  short_ob_ask_threshold: 0.20        # min top-of-book ask imbalance (60/40)
  short_spot_lookback_minutes: 5      # how far back to compare spot vs perp
  short_oi_lookback_minutes: 5        # how far back to compare OI
  # SHORT dump cooldown (anti-dump-bottom): 4th structural signal. Even with
  # spot/OI/book green, entering right after a sharp drop catches the bottom and
  # gets stopped on the bounce. Block new SHORTs when price fell past any
  # threshold recently and let the dump exhaust. Tunable live.
  short_dump_cooldown_enabled: true
  short_dump_threshold_1: 0.005       # block if price down >0.5% in last 5m
  short_dump_threshold_2: 0.008       # block if price down >0.8% in last 10m
  short_dump_threshold_3: 0.012       # block if price down >1.2% in last 15m
